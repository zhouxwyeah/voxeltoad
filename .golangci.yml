# golangci-lint configuration. Run via `make lint`.
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: elite-model-gateway
  revive:
    rules:
      - name: exported
        disabled: true # package-level doc comments already enforced by review

issues:
  exclude-rules:
    # Allow the no-op stub adapter/test helpers to skip some checks.
    - path: _test\.go
      linters:
        - errcheck
