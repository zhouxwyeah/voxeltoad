<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- voxeltoad logo: 像素蘑菇头 + 通道柄 -->
  <!-- 伞面 -->
  <rect x="5"  y="2" width="6" height="1" fill="#2456f6"/>
  <rect x="4"  y="3" width="8" height="1" fill="#2456f6"/>
  <rect x="3"  y="4" width="10" height="1" fill="#2456f6"/>
  <rect x="2"  y="5" width="12" height="1" fill="#2456f6"/>
  <rect x="2"  y="6" width="12" height="1" fill="#2456f6"/>
  <rect x="2"  y="7" width="12" height="1" fill="#2456f6"/>
  <rect x="3"  y="8" width="10" height="1" fill="#2456f6"/>
  <!-- 伞斑（负形） -->
  <rect x="4"  y="5" width="2" height="1" fill="#ffffff"/>
  <rect x="10" y="6" width="2" height="1" fill="#ffffff"/>
  <rect x="5"  y="7" width="1" height="1" fill="#ffffff"/>
  <!-- 高光 -->
  <rect x="5"  y="3" width="2" height="1" fill="#7ee0ff"/>
  <!-- 柄（含 1px 通道镂空） -->
  <rect x="7"  y="9"  width="2" height="1" fill="#2456f6"/>
  <rect x="7"  y="10" width="2" height="1" fill="#2456f6"/>
  <rect x="7"  y="11" width="1" height="1" fill="#2456f6"/>
  <rect x="7"  y="12" width="2" height="1" fill="#2456f6"/>
  <rect x="7"  y="13" width="2" height="1" fill="#2456f6"/>
</svg>
