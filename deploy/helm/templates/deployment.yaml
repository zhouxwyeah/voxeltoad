{{- /*
Deployment for the voxeltoad data plane (gateway). Runs the gateway
binary built from deploy/Dockerfile.gateway; probes /healthz and /readyz.
Config is mounted from the ConfigMap; secrets (GATEWAY_INTERNAL_TOKEN) from the
Secret. The gateway polls the admin plane's snapshot endpoint for dynamic
config (providers/models/routes) — no sidecar needed.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: voxeltoad
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.replicaCount | int64 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: voxeltoad
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voxeltoad
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/voxeltoad/config.yaml"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GATEWAY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voxeltoad-gateway-secret
                  key: internal-token
          {{- with .Values.secretEnv.GATEWAY_INTERNAL_TOKEN.secretKeyRef }}
            # Additional provider keys (env://VAR references) can be added here
            # from the same or other secrets; the gateway resolves them at
            # startup via internal/config.ResolveSecret.
          {{- end }}
          {{- range $env, $ref := .Values.secretEnv }}
            {{- if ne $env "GATEWAY_INTERNAL_TOKEN" }}
            - name: {{ $env }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretKeyRef.name }}
                  key: {{ $ref.secretKeyRef.key }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/voxeltoad
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
            items:
              - key: config.yaml
                path: config.yaml
